<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-black">

    <!-- ── Nav ── -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <span class="text-base sm:text-xl font-semibold text-[#F0F8E3]">Marshall Ryan</span>
                </div>
                <!-- Desktop menu -->
                <div class="hidden md:flex space-x-8">
                    <a href="#" class="text-[#F0F8E3] hover:text-gray-300 transition">Home</a>
                    <a href="#" class="text-[#F0F8E3] hover:text-gray-300 transition">Gallery</a>
                    <a href="#" class="text-[#F0F8E3] hover:text-gray-300 transition">Contact</a>
                </div>
                <!-- Mobile hamburger -->
                <button id="menu-btn" class="md:hidden flex flex-col justify-center items-center gap-1.5 p-2 focus:outline-none">
                    <span class="block w-6 h-0.5 bg-[#F0F8E3] transition-all duration-300" id="bar1"></span>
                    <span class="block w-6 h-0.5 bg-[#F0F8E3] transition-all duration-300" id="bar2"></span>
                    <span class="block w-6 h-0.5 bg-[#F0F8E3] transition-all duration-300" id="bar3"></span>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-black/95 border-t border-white/10">
            <div class="px-4 py-4 flex flex-col space-y-1">
                <a href="#" class="block py-3 px-2 text-[#F0F8E3] hover:text-gray-300 text-lg">Home</a>
                <a href="#" class="block py-3 px-2 text-[#F0F8E3] hover:text-gray-300 text-lg">Gallery</a>
                <a href="#" class="block py-3 px-2 text-[#F0F8E3] hover:text-gray-300 text-lg">Contact</a>
            </div>
        </div>
    </nav>

    <!-- ── Hero ── -->
    <div id="scroll-driver">
        <div id="hero-sticky">
            <video id="src-video" autoplay muted loop playsinline>
                <source src="hero-ready.mp4" type="video/mp4">
            </video>
            <canvas id="video-canvas"></canvas>
            <!-- iOS play button overlay — hidden once video starts -->
            <div id="play-overlay" style="display:none; position:absolute; inset:0; z-index:10; align-items:center; justify-content:center; cursor:pointer;">
                <div style="width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,0.15); backdrop-filter:blur(8px); border:2px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Page content ── -->
    <div id="page-content">

        <section class="text-[#F0F8E3] py-20 sm:py-32 px-5 sm:px-6">
            <div class="max-w-4xl mx-auto">
                <p class="text-xs sm:text-sm tracking-[0.3em] uppercase text-gray-500 mb-3 sm:mb-4">About</p>
                <h2 class="text-3xl sm:text-5xl font-black uppercase mb-6 sm:mb-8 leading-tight">
                    Skater.<br>Creator.<br>Filmmaker.
                </h2>
                <p class="text-gray-400 text-base sm:text-lg leading-relaxed max-w-xl">
                    Marshall Ryan captures the raw energy of street skating through film.
                    Based wherever the next spot is.
                </p>
            </div>
        </section>

        <!-- Gallery Section -->
        <section id="gallery-section" class="text-[#F0F8E3] py-20 sm:py-32 border-t border-white/10">
            <div class="max-w-5xl mx-auto px-5 sm:px-6">
                <p class="text-xs sm:text-sm tracking-[0.3em] uppercase text-gray-500 mb-12 sm:mb-20">Gallery</p>
                <div id="galleries-list"></div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects-section" class="text-[#F0F8E3] py-20 sm:py-32 px-5 sm:px-6 border-t border-white/10">
            <div class="max-w-5xl mx-auto">
                <p class="text-xs sm:text-sm tracking-[0.3em] uppercase text-gray-500 mb-12 sm:mb-20">Work</p>
                <div id="projects-list"></div>
            </div>
        </section>

        <!-- Vimeo Modal -->
        <div id="vimeo-modal" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; padding:20px;">
            <button id="modal-close" style="position:absolute; top:20px; right:24px; color:white; font-size:2rem; background:none; border:none; cursor:pointer; line-height:1;">&#x2715;</button>
            <div style="width:90vw; max-width:900px; aspect-ratio:16/9;">
                <iframe id="modal-iframe" src="" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
        </div>

        <footer class="border-t border-white/10 px-5 py-10 sm:py-12 text-center text-gray-600 text-xs sm:text-sm tracking-widest uppercase">
            © 2026 Marshall Ryan
        </footer>

    </div>
    <!-- Image Lightbox -->
    <div id="img-lightbox">
        <button id="img-lightbox-close">&#x2715;</button>
        <button id="img-lightbox-prev">&#8592;</button>
        <img id="img-lightbox-img" src="" alt="">
        <button id="img-lightbox-next">&#8594;</button>
    </div>

    <script src="scripts/index.js"></script>
</body>
</html>
